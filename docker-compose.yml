services:
  postgres:
    image: postgres:16-alpine
    container_name: moazez-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: moazez
      POSTGRES_PASSWORD: moazez
      POSTGRES_DB: moazez_dev
    ports:
      - "5433:5432"
    volumes:
      - moazez-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moazez -d moazez_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: moazez-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - moazez-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: moazez-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - moazez-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  moazez-postgres-data:
  moazez-redis-data:
  moazez-minio-data:
